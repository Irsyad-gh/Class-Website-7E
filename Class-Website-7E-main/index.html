<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7E Enormous - SMPN 1 Subang</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════════════════════════════════
     NAVBAR  — teks & logo diinjeksi oleh JS
     ══════════════════════════════════════════ -->
<header class="navbar">
  <div class="navbar-container">
    <div class="logo">
      <img src="" alt="" class="logo-img">
      <div class="logo-text">
        <h1></h1>
        <p></p>
      </div>
    </div>
    <nav class="nav-menu">
      <ul>
        <li><a href="index.html"  class="active">Home</a></li>
        <li><a href="people.html">Our Team</a></li>
        <li><a href="gallery.html">Activities</a></li>
        <li><a href="info.html">Information</a></li>
      </ul>
    </nav>
    <div class="hamburger">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>

<main>

  <!-- HERO — src & teks diinjeksi JS -->
  <section class="hero">
    <div class="hero-content">
      <img src="" alt="" class="hero-image">
      <div class="hero-overlay">
        <h1 class="hero-headline" translate="no"></h1>
        <p class="hero-subheadline"></p>
      </div>
    </div>
  </section>

  <!-- ABOUT — teks diinjeksi JS -->
  <section class="about">
    <div class="container">
      <h2>About Our Class</h2>
      <p class="about-text"></p>
    </div>
  </section>

  <!-- JADWAL — JS mengisi #schedule-body -->
  <section class="info-section schedule">
    <div class="container">
      <h2>Jadwal Pelajaran</h2>
      <div class="schedule-container">
        <div class="day-tabs">
          <button class="day-btn active" data-day="senin">Senin</button>
          <button class="day-btn"        data-day="selasa">Selasa</button>
          <button class="day-btn"        data-day="rabu">Rabu</button>
          <button class="day-btn"        data-day="kamis">Kamis</button>
          <button class="day-btn"        data-day="jumat">Jumat</button>
        </div>
        <table class="schedule-table">
          <thead>
            <tr>
              <th>Jam</th>
              <th>Pelajaran</th>
              <th>Guru</th>
              <th>Ruangan</th>
            </tr>
          </thead>
          <tbody id="schedule-body"><!-- JS --></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- CAPTAIN — seluruh konten diinjeksi JS -->
  <section class="captain">
    <div class="container">
      <h2>Meet The Captain</h2>
      <div class="captain-card">
        <img src="" alt="" class="captain-image">
        <div class="captain-info">
          <h3></h3>
          <p class="captain-title"></p>
          <p class="captain-quote"></p>
          <a href="people.html#wali-kelas" class="btn btn-primary">Kenal Lebih Jauh</a>
        </div>
      </div>
    </div>
  </section>

  <!-- COUNTDOWN — nama event & tanggal dari JS -->
  <section class="countdown">
    <div class="container">
      <h2>Menghitung Hari Menuju...</h2>
      <div class="event-cards">
        <div class="event-card">
          <h3><!-- JS --></h3>
          <div class="countdown-timer">
            <div class="time-unit"><span class="time-value" id="days">0</span><span class="time-label">Hari</span></div>
            <div class="time-unit"><span class="time-value" id="hours">0</span><span class="time-label">Jam</span></div>
            <div class="time-unit"><span class="time-value" id="minutes">0</span><span class="time-label">Menit</span></div>
            <div class="time-unit"><span class="time-value" id="seconds">0</span><span class="time-label">Detik</span></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta">
    <div class="container">
      <h2>Jelajahi Lebih Lanjut</h2>
      <div class="cta-buttons">
        <a href="people.html"  class="btn btn-primary">Kenali Tim Kami</a>
        <a href="gallery.html" class="btn btn-secondary">Lihat Galeri</a>
        <a href="info.html"    class="btn btn-secondary">Info Akademik</a>
      </div>
    </div>
  </section>

</main>

<!-- ══════════════════════════════════════════
     FOOTER — teks & link diinjeksi oleh JS
     ══════════════════════════════════════════ -->
<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <p><!-- JS --></p>
      <div class="social-links">
        <a href="#" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" target="_blank" title="TikTok"><i class="fab fa-tiktok"></i></a>
      </div>
    </div>
    <div class="visitor-counter">
      <p>Total Visitors: <span id="visitor-count">0</span></p>
    </div>
  </div>
</footer>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script src="js/script.js"></script>
</body>
</html>
