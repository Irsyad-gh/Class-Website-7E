<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Team - 7E Enormous</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="navbar-container">
    <div class="logo">
      <img src="" alt="" class="logo-img">
      <div class="logo-text">
        <h1></h1>
        <p></p>
      </div>
    </div>
    <nav class="nav-menu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="people.html" class="active">Our Team</a></li>
        <li><a href="gallery.html">Activities</a></li>
        <li><a href="info.html">Information</a></li>
      </ul>
    </nav>
    <div class="hamburger">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>

<main>

  <!-- WALI KELAS — diinjeksi JS ke dalam #wali-kelas -->
  <section class="wali-section">
    <div class="container">
      <h2>Wali Kelas</h2>
      <div id="wali-kelas" class="wali-card"><!-- JS --></div>
    </div>
  </section>

  <!-- PENGURUS KELAS — seluruh grup dibuat JS dari data.pengurusGroups -->
  <section class="pengurus-section">
    <div class="container">
      <h2>Pengurus Kelas</h2>
      <div id="pengurus-container"><!-- JS --></div>
    </div>
  </section>

  <!-- ANGGOTA KELAS — siswa tanpa pengurusGroup, dibuat JS -->
  <section class="students-section">
    <div class="container">
      <h2>Anggota Kelas</h2>
      <div class="students-grid" id="students-grid"><!-- JS --></div>
    </div>
  </section>

</main>

<!-- MODAL DETAIL SISWA — kerangka tetap di HTML, data diinjeksi JS -->
<div class="modal" id="student-modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <div class="modal-body">
      <img src="" alt="" class="modal-image">
      <div class="modal-info">
        <h2 id="modal-name"></h2>
        <p  id="modal-nickname"></p>
        <p  id="modal-position"></p>
        <div class="modal-details">
          <h3>Biodata</h3>
          <p><strong>Tanggal Lahir:</strong> <span id="modal-ttl"></span></p>
          <p><strong>Hobi:</strong>          <span id="modal-hobi"></span></p>
        </div>
        <div class="modal-pesan">
          <h3>Kesan &amp; Pesan</h3>
          <p id="modal-pesan"></p>
        </div>
        <div class="modal-trivia">
          <h3>Fun Trivia</h3>
          <ul id="modal-trivia-list"></ul>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <p><!-- JS --></p>
      <div class="social-links">
        <a href="#" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" target="_blank" title="TikTok"><i class="fab fa-tiktok"></i></a>
      </div>
    </div>
    <div class="visitor-counter">
      <p>Total Visitors: <span id="visitor-count">0</span></p>
    </div>
  </div>
</footer>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script src="js/script.js"></script>
</body>
</html>
