<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Team - 7E Enormous</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════════════════════════════════
     NAVBAR  — teks & logo diinjeksi oleh JS
     ══════════════════════════════════════════ -->
<header class="navbar">
  <div class="navbar-container">
    <div class="logo">
      <img src="" alt="" class="logo-img">
      <div class="logo-text">
        <h1></h1>
        <p></p>
      </div>
    </div>
    <nav class="nav-menu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="people.html" class="active">Our Team</a></li>
        <li><a href="gallery.html">Activities</a></li>
        <li><a href="info.html">Information</a></li>
      </ul>
    </nav>
    <div class="hamburger">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>

<main>

  <!-- HERO — src & teks diinjeksi JS -->
  <section class="hero">
    <div class="hero-content">
      <img src="" alt="" class="hero-image">
      <div class="hero-overlay">
        <h1 class="hero-headline" translate="no">Our Team</h1>
        <p class="hero-subheadline">Meet the amazing students of Class VII E</p>
      </div>
    </div>
  </section>

  <!-- ORGANIZATION SECTION -->
  <section class="captain">
    <div class="container">
      <h2>Organization Structure</h2>
      <div id="orgContainer"></div>
    </div>
  </section>

  <!-- STUDENTS SECTION -->
  <section class="students-section">
    <div class="container">
      <h2>All Students</h2>
      <div class="students-view">
        <input
          type="text"
          class="filter-input"
          id="searchInput"
          placeholder="Search student name..."
        >
        <div class="view-toggle">
          <button class="view-btn active" onclick="switchView('table')">Table</button>
          <button class="view-btn" onclick="switchView('grid')">Cards</button>
        </div>
      </div>

      <div id="tableView" class="table-view">
        <table class="students-table">
          <thead>
            <tr>
              <th>No</th>
              <th>Full Name</th>
              <th>Gender</th>
              <th>Position</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div id="gridView" class="students-grid hidden"></div>
    </div>
  </section>

</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <p>&copy; 2024 Class VII E Website. All rights reserved.</p>
  </div>
</footer>

<script src="js/script.js"></script>
<script>
  let allStudents = [];
  let muridData = null;

  // Load data from murid.json
  async function loadData() {
    try {
      const response = await fetch('murid.json');
      muridData = await response.json();
      allStudents = muridData.students || [];

      renderOrganization();
      renderStudentsTable();
      renderStudentsGrid();
      setupSearch();
    } catch (error) {
      console.error('Error loading murid.json:', error);
      document.querySelector('main').innerHTML = '<p style="text-align: center; color: red; padding: 2rem;">Error loading data. Please ensure murid.json is in the same directory.</p>';
    }
  }

  function renderOrganization() {
    const orgContainer = document.getElementById('orgContainer');
    // Since murid.json doesn't have organization data, we'll skip this for now
    // You can add organization data to murid.json or data.json
    orgContainer.innerHTML = '<p>Organization structure will be displayed here.</p>';
  }

  function renderStudentsTable() {
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = allStudents.map(student => `
      <tr>
        <td>${student.no}</td>
        <td class="student-name">${student.name}</td>
        <td><span class="gender-badge ${student.gender.toLowerCase()}">${student.gender}</span></td>
        <td><span class="position-badge">Student</span></td>
      </tr>
    `).join('');
  }

  function renderStudentsGrid() {
    const gridView = document.getElementById('gridView');
    gridView.innerHTML = allStudents.map(student => `
      <div class="student-card">
        <div class="student-info">
          <h3>${student.name}</h3>
          <p>No: ${student.no} | Gender: ${student.gender}</p>
        </div>
      </div>
    `).join('');
  }

  function setupSearch() {
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', function() {
      const query = this.value.toLowerCase();
      const filtered = allStudents.filter(student =>
        student.name.toLowerCase().includes(query)
      );
      renderFilteredTable(filtered);
      renderFilteredGrid(filtered);
    });
  }

  function renderFilteredTable(students) {
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = students.map(student => `
      <tr>
        <td>${student.no}</td>
        <td class="student-name">${student.name}</td>
        <td><span class="gender-badge ${student.gender.toLowerCase()}">${student.gender}</span></td>
        <td><span class="position-badge">Student</span></td>
      </tr>
    `).join('');
  }

  function renderFilteredGrid(students) {
    const gridView = document.getElementById('gridView');
    gridView.innerHTML = students.map(student => `
      <div class="student-card">
        <div class="student-info">
          <h3>${student.name}</h3>
          <p>No: ${student.no} | Gender: ${student.gender}</p>
        </div>
      </div>
    `).join('');
  }

  function switchView(view) {
    const tableView = document.getElementById('tableView');
    const gridView = document.getElementById('gridView');
    const tableBtn = document.querySelector('.view-btn:nth-child(1)');
    const gridBtn = document.querySelector('.view-btn:nth-child(2)');

    if (view === 'table') {
      tableView.classList.remove('hidden');
      gridView.classList.add('hidden');
      tableBtn.classList.add('active');
      gridBtn.classList.remove('active');
    } else {
      tableView.classList.add('hidden');
      gridView.classList.remove('hidden');
      tableBtn.classList.remove('active');
      gridBtn.classList.add('active');
    }
  }

</script>

</body>
</html>
